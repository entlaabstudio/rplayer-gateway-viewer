plugins {
    id "com.android.application"
}

android {
    namespace "com.technotramp.unexpectedtracks"
    compileSdk 35

    defaultConfig {
        applicationId "com.technotramp.unexpectedtracks"
        minSdk 23
        targetSdk 35
        versionCode 17
        versionName "0.1.0"
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            outputFileName = "unexpected-tracks-${variant.versionName}-build-${variant.versionCode}-${variant.name}.apk"
        }
    }
}
